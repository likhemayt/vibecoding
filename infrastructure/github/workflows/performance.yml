name: Performance Check

on:
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * 0' # Weekly

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start server
        run: npm start &
        env:
          NODE_ENV: production

      - name: Wait for server
        run: sleep 5

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v10
        with:
          configPath: './lighthouse.config.js'
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('./lighthouse-results.json'));

            let comment = '## 📊 Lighthouse Results\n\n';
            results.forEach(result => {
              comment += `### ${result.url}\n`;
              comment += `| Metric | Score |\n`;
              comment += `|--------|-------|\n`;
              comment += `| Performance | ${result.summary.performance} |\n`;
              comment += `| Accessibility | ${result.summary.accessibility} |\n`;
              comment += `| Best Practices | ${result.summary['best-practices']} |\n`;
              comment += `| SEO | ${result.summary.seo} |\n`;
              comment += `| PWA | ${result.summary.pwa} |\n\n`;
            });

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            })
