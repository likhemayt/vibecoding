name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'templates/project-templates/nextjs-starter/package-lock.json'

      - name: Install dependencies
        working-directory: templates/project-templates/nextjs-starter
        run: npm ci

      - name: Run tests
        working-directory: templates/project-templates/nextjs-starter
        run: npm run test
        continue-on-error: false

      - name: Run linting
        working-directory: templates/project-templates/nextjs-starter
        run: npm run lint

      - name: Type check
        working-directory: templates/project-templates/nextjs-starter
        run: npm run type-check

      - name: Build project
        working-directory: templates/project-templates/nextjs-starter
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deployment Info
        run: |
          echo "✅ Build successful!"
          echo "Vercel will auto-deploy from GitHub"
          echo "Production URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}"

      - name: Notify success
        if: success()
        uses: slackapi/slack-github-action@v1
        continue-on-error: true
        with:
          payload: |
            {
              "text": "✅ Production deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deploy Successful* 🚀\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        continue-on-error: true
        with:
          payload: |
            {
              "text": "❌ Production deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deploy Failed* ⚠️\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}\n\nPlease investigate immediately!"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
