name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'templates/project-templates/nextjs-starter/package-lock.json'

      - name: Install dependencies
        working-directory: templates/project-templates/nextjs-starter
        run: npm ci

      - name: Run tests
        working-directory: templates/project-templates/nextjs-starter
        run: npm run test

      - name: Build project
        working-directory: templates/project-templates/nextjs-starter
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.STAGING_SITE_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}

      - name: Deployment Info
        run: |
          echo "✅ Build successful!"
          echo "Vercel will auto-deploy from GitHub"
          echo "Staging URL: ${{ secrets.STAGING_SITE_URL }}"

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        continue-on-error: true
        with:
          payload: |
            {
              "text": "❌ Staging deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deploy Failed*\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
